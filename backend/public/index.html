<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LA Parking Finder</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1>LA Parking Finder</h1>
      <p class="subtitle" id="subtitle">All Spots</p>
    </header>

    <div class="filter-container">
      <button class="filter-btn active" id="btn-all" onclick="setFilter('all')">All Spots <span id="count-all"></span></button>
      <button class="filter-btn" id="btn-available" onclick="setFilter('available')">Available Only <span id="count-available"></span></button>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Loading parking data...</p>
    </div>

    <div class="error-message" id="error" style="display:none">
      <p>Unable to load parking data. Please try again.</p>
      <button class="retry-btn" onclick="fetchData()">Retry</button>
    </div>

    <div class="spot-list" id="spot-list"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
